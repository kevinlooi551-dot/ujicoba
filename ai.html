<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Pendaftaran Lomba</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            margin: 0;
            padding: 0;
        }
        header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .container {
            width: 600px;
            margin: 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0,123,255,0.5);
            outline: none;
        }
        button {
            padding: 12px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button[type="submit"] {
            background: #28a745;
            color: white;
        }
        button[type="submit"]:hover {
            background: #218838;
            transform: scale(1.05);
        }
        button[type="reset"] {
            background: #dc3545;
            color: white;
        }
        button[type="reset"]:hover {
            background: #a71d2a;
            transform: scale(1.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th {
            background: #007bff;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>Sistem Pendaftaran Lomba</header>
    <div class="container">
        <h2>Formulir Pendaftaran</h2>
        <form id="formPendaftaran">
            <label for="nama">Nama Lengkap:</label>
            <input type="text" id="nama" name="nama" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="telepon">Nomor Telepon:</label>
            <input type="tel" id="telepon" name="telepon" required>

            <label for="kategori">Kategori Lomba:</label>
            <select id="kategori" name="kategori" required>
                <option value="">--Pilih Kategori--</option>
                <option value="Menyanyi">Menyanyi</option>
                <option value="Menari">Menari</option>
                <option value="Puisi">Baca Puisi</option>
                <option value="Olahraga">Olahraga</option>
            </select>

            <label for="pesan">Pesan Tambahan:</label>
            <textarea id="pesan" name="pesan" rows="4"></textarea>

            <button type="submit">Daftar</button>
            <button type="reset">Reset</button>
        </form>
    </div>

    <div class="container">
        <h2>Daftar Peserta</h2>
        <table id="tabelPeserta">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Telepon</th>
                <th>Kategori</th>
            </tr>
        </table>
    </div>

    <script>
        let nomor = 1;
        document.getElementById("formPendaftaran").addEventListener("submit", function(e){
            e.preventDefault();
            const nama = document.getElementById("nama").value;
            const email = document.getElementById("email").value;
            const telepon = document.getElementById("telepon").value;
            const kategori = document.getElementById("kategori").value;

            const tabel = document.getElementById("tabelPeserta");
            const row = tabel.insertRow();
            row.innerHTML = `
                <td>${nomor++}</td>
                <td>${nama}</td>
                <td>${email}</td>
                <td>${telepon}</td>
                <td>${kategori}</td>
            `;
            alert("Pendaftaran berhasil!");
            document.getElementById("formPendaftaran").reset();
        });
    </script>
</body>
</html>
